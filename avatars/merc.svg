<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <defs>
    <radialGradient id="bg-merc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <linearGradient id="accent-merc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="hair-merc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="dress-merc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <clipPath id="circle-merc">
      <circle cx="75" cy="75" r="73"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="75" cy="75" r="73" fill="url(#bg-merc)"/>
  <circle cx="75" cy="75" r="73" fill="none" stroke="url(#accent-merc)" stroke-width="2"/>
  <!-- Speed lines -->
  <line x1="0" y1="50" x2="40" y2="50" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="60" x2="35" y2="60" stroke="#ff9800" stroke-width="0.7" opacity="0.2"/>
  <line x1="110" y1="90" x2="150" y2="90" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="100" x2="150" y2="100" stroke="#ff9800" stroke-width="0.7" opacity="0.2"/>
  <!-- Body -->
  <ellipse cx="75" cy="118" rx="32" ry="22" fill="#ff9800" opacity="0.85" clip-path="url(#circle-merc)"/>
  <!-- White center stripe -->
  <path d="M70 100 L70 140 L80 140 L80 100" fill="#fff" opacity="0.4" clip-path="url(#circle-merc)"/>
  <!-- Neck -->
  <rect x="68" y="98" width="14" height="16" rx="5" fill="#f0d0b0"/>
  <!-- Face -->
  <ellipse cx="75" cy="82" rx="25" ry="27" fill="#f5d5a0"/>
  <!-- Hair - back (golden) -->
  <ellipse cx="75" cy="64" rx="27" ry="20" fill="url(#hair-merc)"/>
  <!-- Spiky/dynamic hair -->
  <path d="M50 62 Q45 48 55 40 Q62 34 70 40 Q75 36 80 40 Q88 34 95 40 Q105 48 100 62" fill="url(#hair-merc)"/>
  <!-- Hair spikes -->
  <path d="M55 52 Q50 38 58 32" stroke="#ffb300" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M75 48 Q73 32 75 26" stroke="#ff9800" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M95 52 Q100 38 92 32" stroke="#ffb300" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyes - bright and energetic -->
  <ellipse cx="64" cy="82" rx="5.5" ry="5" fill="#1a0800"/>
  <ellipse cx="86" cy="82" rx="5.5" ry="5" fill="#1a0800"/>
  <!-- Orange iris -->
  <ellipse cx="64" cy="82" rx="3.5" ry="3.5" fill="#e65100"/>
  <ellipse cx="86" cy="82" rx="3.5" ry="3.5" fill="#e65100"/>
  <!-- Bright highlight -->
  <circle cx="65.5" cy="80.5" r="1.5" fill="#fff" opacity="1"/>
  <circle cx="87.5" cy="80.5" r="1.5" fill="#fff" opacity="1"/>
  <!-- Eyebrows - angled upward -->
  <path d="M58 76 Q64 73 70 75" stroke="#cc5500" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M80 75 Q86 73 92 76" stroke="#cc5500" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M73 89 Q75 92 77 89" stroke="#c09060" stroke-width="1.2" fill="none"/>
  <!-- Energetic grin -->
  <path d="M66 97 Q75 103 84 97" stroke="#cc5500" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Caduceus/wing hat emblem -->
  <g transform="translate(75,47)">
    <!-- Small wings on head -->
    <path d="M-18,-3 Q-12,-10 -8,-3" fill="#fff" opacity="0.8"/>
    <path d="M-18,-3 Q-15,-8 -10,-4" fill="#ff9800" opacity="0.7"/>
    <path d="M18,-3 Q12,-10 8,-3" fill="#fff" opacity="0.8"/>
    <path d="M18,-3 Q15,-8 10,-4" fill="#ff9800" opacity="0.7"/>
  </g>
  <!-- Wi-Fi / signal icon (SNS speed) -->
  <g transform="translate(108,32)" opacity="0.8">
    <path d="M-8,8 Q0,-4 8,8" stroke="#ff9800" stroke-width="1.5" fill="none"/>
    <path d="M-5,8 Q0,0 5,8" stroke="#fff" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="8" r="1.5" fill="#ff9800"/>
  </g>
  <!-- Speed dots -->
  <circle cx="22" cy="68" r="2" fill="#ff9800" opacity="0.6"/>
  <circle cx="15" cy="68" r="1.5" fill="#ff9800" opacity="0.4"/>
  <circle cx="10" cy="68" r="1" fill="#ff9800" opacity="0.3"/>
</svg>
