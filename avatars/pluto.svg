<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <defs>
    <radialGradient id="bg-pluto" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#05030f"/>
    </radialGradient>
    <linearGradient id="accent-pluto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#6a0dad"/>
    </linearGradient>
    <linearGradient id="dress-pluto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a006a"/>
      <stop offset="100%" stop-color="#1a0038"/>
    </linearGradient>
    <clipPath id="circle-pluto">
      <circle cx="75" cy="75" r="73"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="75" cy="75" r="73" fill="url(#bg-pluto)"/>
  <circle cx="75" cy="75" r="73" fill="none" stroke="url(#accent-pluto)" stroke-width="2"/>
  <!-- Background coins -->
  <circle cx="18" cy="28" r="5" fill="#ffd700" opacity="0.15"/>
  <circle cx="132" cy="35" r="4" fill="#ffd700" opacity="0.12"/>
  <circle cx="25" cy="118" r="4" fill="#ffd700" opacity="0.1"/>
  <circle cx="128" cy="120" r="5" fill="#ffd700" opacity="0.12"/>
  <!-- Body/robe -->
  <ellipse cx="75" cy="118" rx="35" ry="23" fill="url(#dress-pluto)" opacity="0.95" clip-path="url(#circle-pluto)"/>
  <!-- Gold trim on robe -->
  <path d="M40 118 Q75 108 110 118" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.7" clip-path="url(#circle-pluto)"/>
  <!-- Neck -->
  <rect x="68" y="98" width="14" height="15" rx="4" fill="#d0c0e0"/>
  <!-- Face -->
  <ellipse cx="75" cy="82" rx="25" ry="27" fill="#e0d0f0"/>
  <!-- Hair - back (black) -->
  <ellipse cx="75" cy="65" rx="27" ry="21" fill="#1a0828"/>
  <!-- Hair - sleek and dark -->
  <path d="M48 70 Q46 55 55 44 Q65 36 75 40 Q85 36 95 44 Q104 55 102 70" fill="#1a0828"/>
  <!-- Side hair, sleek -->
  <path d="M48 70 Q42 85 46 103" stroke="#2a0838" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M102 70 Q108 85 104 103" stroke="#2a0838" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Eyes - sharp analytical -->
  <ellipse cx="64" cy="82" rx="5.5" ry="4" fill="#0d0018"/>
  <ellipse cx="86" cy="82" rx="5.5" ry="4" fill="#0d0018"/>
  <!-- Purple iris -->
  <ellipse cx="64" cy="82" rx="3" ry="3" fill="#6a0dad"/>
  <ellipse cx="86" cy="82" rx="3" ry="3" fill="#6a0dad"/>
  <circle cx="65" cy="81" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="87" cy="81" r="1.2" fill="#fff" opacity="0.9"/>
  <!-- Thin elegant eyebrows -->
  <path d="M59 76 Q64 74 69 75" stroke="#1a0828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M81 75 Q86 74 91 76" stroke="#1a0828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M73 89 Q75 92 77 89" stroke="#b0a0c8" stroke-width="1.2" fill="none"/>
  <!-- Mouth - composed/serious -->
  <path d="M69 97 Q75 99 81 97" stroke="#c0a0d8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Gold hair accessory -->
  <rect x="62" y="55" width="26" height="6" rx="3" fill="#ffd700" opacity="0.85"/>
  <circle cx="75" cy="58" r="4" fill="#ffd700"/>
  <circle cx="75" cy="58" r="2" fill="#ffaa00"/>
  <!-- Gold coin earrings -->
  <circle cx="49" cy="86" r="4" fill="#ffd700" opacity="0.85"/>
  <text x="49" y="89" font-size="5" text-anchor="middle" fill="#6a0dad" font-weight="bold">¥</text>
  <circle cx="101" cy="86" r="4" fill="#ffd700" opacity="0.85"/>
  <text x="101" y="89" font-size="5" text-anchor="middle" fill="#6a0dad" font-weight="bold">¥</text>
  <!-- Ledger book held at bottom -->
  <rect x="55" y="126" width="18" height="14" rx="2" fill="#1a0038" stroke="#ffd700" stroke-width="1" clip-path="url(#circle-pluto)" opacity="0.9"/>
  <line x1="58" y1="130" x2="70" y2="130" stroke="#ffd700" stroke-width="0.7" opacity="0.7"/>
  <line x1="58" y1="133" x2="70" y2="133" stroke="#ffd700" stroke-width="0.7" opacity="0.7"/>
</svg>
