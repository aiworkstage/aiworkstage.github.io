<script>
// URLパラメータからAIのプリセット
(function() {
  const params = new URLSearchParams(window.location.search);
  const ai = params.get('ai');
  if (!ai) return;
  const selected = ai.split(',');
  const map = {
    'chatgpt': 'ai-chatgpt',
    'gemini': 'ai-gemini',
    'copilot': 'ai-copilot',
    'claude': 'ai-claude',
    'openclaw': 'ai-openclaw',
    'nanobanana': 'ai-nanobanana'
  };
  selected.forEach(id => {
    const el = document.getElementById(map[id.trim()]);
    if (el) el.checked = true;
  });
})();
</script>
