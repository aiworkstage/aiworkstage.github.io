<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヒアリングフォーム｜AIエージェント構築 | AI Work Stage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0a0a0f; color: #e8e8f0; }
    header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e1e2e; }
    .logo { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #7c6bff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    nav a { color: #a0a0c0; text-decoration: none; margin-left: 30px; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover { color: #fff; }
    .hero { text-align: center; padding: 60px 40px 40px; background: radial-gradient(ellipse at 50% 0%, rgba(124,107,255,0.15) 0%, transparent 60%); }
    .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
    .hero h1 span { background: linear-gradient(135deg, #7c6bff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: #8888aa; font-size: 1rem; }
    .form-wrap { max-width: 640px; margin: 0 auto; padding: 40px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.9rem; color: #a0a0c0; margin-bottom: 6px; }
    label span.req { color: #7c6bff; margin-left: 4px; }
    input, textarea, select { background: #12121e; border: 1px solid #1e1e2e; border-radius: 10px; padding: 14px 18px; color: #e8e8f0; font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: #7c6bff; }
    textarea { resize: vertical; min-height: 100px; }
    select option { background: #12121e; }
    button[type=submit] { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #7c6bff, #00d4ff); color: #fff; border: none; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; margin-top: 10px; }
    button[type=submit]:hover { opacity: 0.85; }
    footer { text-align: center; padding: 30px; color: #444466; font-size: 0.8rem; border-top: 1px solid #1e1e2e; margin-top: 60px; }
    .note { background: #12121e; border: 1px solid #1e1e2e; border-radius: 10px; padding: 16px 20px; margin-bottom: 30px; font-size: 0.88rem; color: #8888aa; line-height: 1.7; }
    .note strong { color: #7c6bff; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡ AI Work Stage</div>
  <nav>
    <a href="index.html">トップへ戻る</a>
  </nav>
</header>

<section class="hero">
  <h1>🤖 <span>AIエージェント構築</span><br>ヒアリングフォーム</h1>
  <p>以下の項目をご記入いただき、送信してください。</p>
</section>

<div class="form-wrap">
  <div class="note">
    <strong>📋 ヒアリング完了後、3営業日以内にお見積もりをメールでお送りします。</strong><br>
    ご確認・ご同意いただいた後、決済リンクをご案内します。
  </div>
  <div class="note">
    <strong>📋 ご記入のお願い</strong><br>
    実現したいことを具体的にご記入いただくほど、精度の高いエージェントを構築できます。<br>
    回答後、24時間以内に担当AIエージェントより次のご連絡をお送りします。
  </div>

  <form action="https://formspree.io/f/xojnzlpg" method="POST">
    <input type="hidden" name="_subject" value="【ヒアリング】AIエージェント構築">
    <input type="hidden" name="service_type" value="AIエージェント構築">

    <div class="form-group">
      <label>お名前・会社名<span class="req">*</span></label>
      <input type="text" name="name" placeholder="例：山田太郎 / 株式会社サンプル" required>
    </div>

    <div class="form-group">
      <label>メールアドレス<span class="req">*</span></label>
      <input type="email" name="email" placeholder="example@mail.com" required>
    </div>

    <div class="form-group">
      <label>自動化したい業務内容<span class="req">*</span></label>
      <textarea name="automation_goal" placeholder="例：毎日SNSに自動投稿したい / 問い合わせをAIが自動返信する仕組みが欲しい" required></textarea>
    </div>

    <div class="form-group">
      <label>現在の作業フロー<span class="req">*</span></label>
      <textarea name="current_flow" placeholder="例：毎朝Twitterに手動で投稿している。ネタを考えて文章を書いて投稿するのに30分かかる。" required></textarea>
    </div>

    <div class="form-group">
      <label>使用しているツール・システム<span class="req">*</span></label>
      <textarea name="tools_used" placeholder="例：Discord / LINE / Slack / Google Sheets / Notion / 独自システム など" required></textarea>
    </div>

    <div class="form-group">
      <label>期待する成果・KPI</label>
      <textarea name="expected_kpi" placeholder="例：作業時間を1日2時間削減したい / 問い合わせ対応を24時間自動化したい"></textarea>
    </div>

    <div class="form-group">
      <label>予算感</label>
      <select name="budget">
        <option value="">選択してください</option>
        <option value="〜¥30,000">〜¥30,000</option>
        <option value="¥30,000〜¥50,000">¥30,000〜¥50,000</option>
        <option value="¥50,000〜¥100,000">¥50,000〜¥100,000</option>
        <option value="¥100,000〜">¥100,000〜</option>
        <option value="相談して決めたい">相談して決めたい</option>
      </select>
    </div>

    <div class="form-group">
      <label>X（Twitter）との連携は必要ですか？</label>
      <select name="need_twitter">
        <option value="">選択してください</option>
        <option value="はい（API費用$100/月が別途必要になります）">はい（※API費用$100/月が別途必要になります）</option>
        <option value="いいえ">いいえ</option>
      </select>
    </div>

    <div class="form-group">
      <label>VPSサーバーをお持ちですか？</label>
      <select name="has_vps">
        <option value="">選択してください</option>
        <option value="はい">はい</option>
        <option value="いいえ">いいえ</option>
      </select>
    </div>

    <div class="form-group">
      <label>希望納期<span class="req">*</span></label>
      <input type="text" name="deadline" placeholder="例：1ヶ月以内 / 4月末まで / なるべく早く" required>
    </div>

    <div class="form-group">
      <label>その他ご要望・ご質問</label>
      <textarea name="remarks" placeholder="何でもお気軽にどうぞ"></textarea>
    </div>

    <button type="submit">送信する →</button>
  </form>
</div>

<footer>
  <p>© 2025 AI Work Stage. All rights reserved.</p>
  <p style="margin-top:8px;"><a href="terms.html" style="color:#7c6bff;text-decoration:none;">利用規約・返金ポリシー</a></p>
</footer>

</body>
</html>
