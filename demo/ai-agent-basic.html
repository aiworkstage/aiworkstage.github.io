<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIチャットボット デモ | 株式会社サクラビジネス</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hiragino Kaku Gothic ProN',sans-serif; background:#0a0e1a; color:#e0e0f0; display:flex; flex-direction:column; min-height:100vh; }
.page-header { background:#12121e; border-bottom:1px solid #2a2a3e; padding:20px 40px; text-align:center; }
.page-header h1 { font-size:1.2rem; color:#fff; }
.page-header p { color:#888; font-size:0.85rem; margin-top:4px; }
.chat-container { max-width:640px; margin:40px auto; padding:0 20px; flex:1; width:100%; }
.chat-box { background:#12121e; border:1px solid #2a2a3e; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.chat-header { background:#0d0d20; padding:16px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #2a2a3e; }
.bot-avatar { width:40px; height:40px; background:linear-gradient(135deg,#7c6bff,#a78bfa); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.bot-name { color:#fff; font-weight:700; font-size:0.95rem; }
.bot-status { color:#4caf50; font-size:0.8rem; display:flex; align-items:center; gap:4px; }
.bot-status::before { content:''; width:8px; height:8px; background:#4caf50; border-radius:50%; display:inline-block; }
.messages { height:400px; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:80%; padding:12px 16px; border-radius:16px; font-size:0.9rem; line-height:1.5; }
.msg.bot { background:#1a1a3e; color:#e0e0f0; align-self:flex-start; border-bottom-left-radius:4px; }
.msg.user { background:linear-gradient(135deg,#7c6bff,#a78bfa); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.msg-time { font-size:0.7rem; color:#666; margin-top:4px; }
.quick-replies { padding:12px 20px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid #1a1a2e; }
.quick-btn { background:#1a1a3e; border:1px solid #2a2a3e; color:#a78bfa; padding:6px 14px; border-radius:20px; font-size:0.82rem; cursor:pointer; transition:background 0.2s; }
.quick-btn:hover { background:#2a2a5e; }
.input-area { display:flex; gap:8px; padding:16px 20px; border-top:1px solid #2a2a3e; }
.input-area input { flex:1; background:#0a0e1a; border:1px solid #2a2a3e; color:#fff; padding:10px 16px; border-radius:50px; font-size:0.9rem; outline:none; }
.input-area input:focus { border-color:#7c6bff; }
.send-btn { background:#7c6bff; border:none; color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.1rem; transition:transform 0.2s; }
.send-btn:hover { transform:scale(1.1); }
.typing { display:none; padding:8px 16px; background:#1a1a3e; border-radius:16px; border-bottom-left-radius:4px; align-self:flex-start; }
.typing span { display:inline-block; width:8px; height:8px; background:#7c6bff; border-radius:50%; animation:bounce 1.4s infinite; margin-right:3px; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style>
</head>
<body>
<div style="background:#7c6bff;color:#fff;padding:8px;text-align:center;font-size:0.85rem;">🎨 これはデモサイトです | <a href="../service-ai-agent.html" style="color:#fff;">← サービス詳細に戻る</a></div>
<div class="page-header">
  <h1>🤖 AIチャットボット — ベーシックプラン デモ</h1>
  <p>株式会社サクラビジネス公式チャットボット / FAQ自動回答</p>
</div>
<div class="chat-container">
  <div class="chat-box">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">サクラAIアシスタント</div>
        <div class="bot-status">オンライン</div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">こんにちは！株式会社サクラビジネスのAIアシスタントです。ご質問にお答えします。<div class="msg-time">今</div></div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="quick-replies">
      <button class="quick-btn" onclick="quickReply('料金を教えてください')">料金を知りたい</button>
      <button class="quick-btn" onclick="quickReply('対応業種を教えてください')">対応業種は？</button>
      <button class="quick-btn" onclick="quickReply('無料相談はできますか？')">無料相談したい</button>
      <button class="quick-btn" onclick="quickReply('営業時間を教えてください')">営業時間は？</button>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>
<script>
const faqs = {
  '料金': 'ベーシックプランは月額¥30,000〜からご利用いただけます。初回は無料相談も承っております。',
  '対応業種': '製造業・飲食・小売・IT・医療など幅広い業種に対応しています。まずはご相談ください。',
  '無料相談': 'はい！初回相談は完全無料です。お電話（03-0000-0000）またはフォームよりお申し込みください。',
  '営業時間': '平日9:00〜18:00が営業時間です。お問い合わせフォームは24時間受付中です。',
  '解約': '月次契約のため、毎月末での解約が可能です。解約違約金はありません。',
  'ai': 'AI導入支援も行っております！業務効率化に向けた最適なAIツールをご提案します。',
  'dx': 'DX（デジタルトランスフォーメーション）支援は得意分野です。現状分析から実装・定着まで伴走します。',
};
function getReply(msg) {
  for (const [key, reply] of Object.entries(faqs)) {
    if (msg.includes(key)) return reply;
  }
  return 'ご質問ありがとうございます。詳しくは担当者にお繋ぎします。お電話（03-0000-0000）またはお問い合わせフォームからご連絡ください。';
}
function addMsg(text, type) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = text + '<div class="msg-time">今</div>';
  messages.insertBefore(div, document.getElementById('typing'));
  messages.scrollTop = messages.scrollHeight;
}
function showTyping() {
  document.getElementById('typing').style.display = 'block';
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}
function hideTyping() { document.getElementById('typing').style.display = 'none'; }
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(getReply(text), 'bot');
  }, 1200);
}
function quickReply(text) {
  addMsg(text, 'user');
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(getReply(text), 'bot');
  }, 1000);
}
</script>
</body>
</html>
