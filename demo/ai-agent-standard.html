<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マルチ機能AIエージェント デモ | 株式会社サクラビジネス</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hiragino Kaku Gothic ProN',sans-serif; background:#0a0e1a; color:#e0e0f0; min-height:100vh; }
.page-header { background:#12121e; border-bottom:1px solid #2a2a3e; padding:16px 40px; text-align:center; }
.page-header h1 { font-size:1.1rem; color:#fff; }
.layout { display:grid; grid-template-columns:240px 1fr; max-width:900px; margin:32px auto; gap:20px; padding:0 20px; }
@media(max-width:700px){ .layout { grid-template-columns:1fr; } }
/* Sidebar */
.sidebar { background:#12121e; border:1px solid #2a2a3e; border-radius:16px; padding:20px; height:fit-content; }
.sidebar h3 { color:#888; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:16px; }
.mode-btn { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; cursor:pointer; margin-bottom:8px; transition:background 0.2s; color:#c0c0d8; font-size:0.9rem; border:none; background:transparent; width:100%; }
.mode-btn:hover { background:#1a1a3e; }
.mode-btn.active { background:rgba(124,107,255,0.2); color:#a78bfa; border-left:3px solid #7c6bff; }
.mode-icon { font-size:1.1rem; }
/* Main chat */
.chat-area { background:#12121e; border:1px solid #2a2a3e; border-radius:16px; overflow:hidden; }
.chat-header { background:#0d0d20; padding:14px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #2a2a3e; }
.bot-avatar { width:36px; height:36px; background:linear-gradient(135deg,#7c6bff,#a78bfa); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; }
.mode-badge { background:#7c6bff22; color:#a78bfa; font-size:0.75rem; padding:2px 10px; border-radius:10px; margin-left:8px; }
.messages { height:360px; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:80%; padding:10px 14px; border-radius:14px; font-size:0.88rem; line-height:1.5; }
.msg.bot { background:#1a1a3e; color:#e0e0f0; align-self:flex-start; border-bottom-left-radius:4px; }
.msg.user { background:linear-gradient(135deg,#7c6bff,#a78bfa); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
/* Booking form in chat */
.booking-form { background:#0a0e1a; border-radius:12px; padding:16px; margin-top:8px; }
.booking-form h4 { color:#fff; font-size:0.9rem; margin-bottom:12px; }
.booking-form input, .booking-form select { width:100%; background:#12121e; border:1px solid #2a2a3e; color:#fff; padding:8px 12px; border-radius:8px; margin-bottom:8px; font-size:0.85rem; }
.booking-form button { background:#7c6bff; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-size:0.85rem; }
.notify-card { background:#0a0e1a; border:1px solid #2a2a3e; border-radius:12px; padding:14px; margin-top:8px; }
.notify-card p { font-size:0.85rem; color:#c0c0d8; line-height:1.5; }
.notify-card .email-preview { background:#12121e; border-radius:8px; padding:12px; margin-top:10px; font-size:0.82rem; color:#888; }
.quick-replies { padding:10px 16px; display:flex; gap:6px; flex-wrap:wrap; border-top:1px solid #1a1a2e; }
.quick-btn { background:#1a1a3e; border:1px solid #2a2a3e; color:#a78bfa; padding:5px 12px; border-radius:16px; font-size:0.8rem; cursor:pointer; transition:background 0.2s; }
.quick-btn:hover { background:#2a2a5e; }
.input-area { display:flex; gap:8px; padding:14px 16px; border-top:1px solid #2a2a3e; }
.input-area input { flex:1; background:#0a0e1a; border:1px solid #2a2a3e; color:#fff; padding:9px 14px; border-radius:50px; font-size:0.88rem; outline:none; }
.input-area input:focus { border-color:#7c6bff; }
.send-btn { background:#7c6bff; border:none; color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1rem; }
.typing { display:none; padding:8px 14px; background:#1a1a3e; border-radius:14px; align-self:flex-start; }
.typing span { display:inline-block; width:7px; height:7px; background:#7c6bff; border-radius:50%; animation:bounce 1.4s infinite; margin-right:3px; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style>
</head>
<body>
<div style="background:#7c6bff;color:#fff;padding:8px;text-align:center;font-size:0.85rem;">🎨 これはデモサイトです | <a href="../service-ai-agent.html" style="color:#fff;">← サービス詳細に戻る</a></div>
<div class="page-header">
  <h1>🤖 マルチ機能AIエージェント — スタンダードプラン デモ</h1>
</div>
<div class="layout">
  <div class="sidebar">
    <h3>モード切替</h3>
    <button class="mode-btn active" onclick="setMode('faq',this)"><span class="mode-icon">💬</span>FAQ対応</button>
    <button class="mode-btn" onclick="setMode('booking',this)"><span class="mode-icon">📅</span>予約受付</button>
    <button class="mode-btn" onclick="setMode('notify',this)"><span class="mode-icon">✉️</span>メール通知</button>
    <hr style="border-color:#2a2a3e;margin:16px 0;">
    <h3>統計</h3>
    <div style="font-size:0.85rem;color:#c0c0d8;line-height:2;">
      <div>本日の対応数: <span style="color:#7c6bff;font-weight:700;">47</span></div>
      <div>解決率: <span style="color:#4caf50;font-weight:700;">94%</span></div>
      <div>平均応答: <span style="color:#ffc107;font-weight:700;">0.8秒</span></div>
    </div>
  </div>
  <div class="chat-area">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <strong style="color:#fff;font-size:0.95rem;">サクラAIエージェント</strong>
        <span class="mode-badge" id="modeBadge">FAQ対応モード</span>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">こんにちは！マルチ機能AIエージェントです。FAQ・予約・メール通知に対応しています。左のメニューでモードを切り替えてください。</div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="quick-replies" id="quickReplies">
      <button class="quick-btn" onclick="q('料金を教えてください')">料金は？</button>
      <button class="quick-btn" onclick="q('対応業種を教えてください')">対応業種は？</button>
      <button class="quick-btn" onclick="q('無料相談したい')">無料相談</button>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')send()">
      <button class="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>
<script>
let mode = 'faq';
const faqMap = {
  '料金': 'ベーシックは月額¥30,000〜、スタンダードは¥50,000〜、プレミアムは¥100,000〜です。',
  '対応業種': '製造業・飲食・小売・IT・医療など幅広く対応しています。',
  '無料相談': '初回相談は完全無料です。下の予約モードから日時をご指定ください。',
};
const modes = {
  faq: { badge:'FAQ対応モード', greet:'FAQモードです。ご質問をどうぞ！', quickBtns:[['料金を教えてください','料金は？'],['対応業種を教えてください','対応業種は？'],['無料相談したい','無料相談']] },
  booking: { badge:'予約受付モード', greet:'予約受付モードです。ご希望の日時をお選びください。', quickBtns:[] },
  notify: { badge:'メール通知モード', greet:'メール通知設定モードです。通知を送信します。', quickBtns:[] },
};
function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('modeBadge').textContent = modes[m].badge;
  addMsg(modes[m].greet, 'bot');
  if (m==='booking') addBookingForm();
  if (m==='notify') addNotifyCard();
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = modes[m].quickBtns.map(b=>`<button class="quick-btn" onclick="q('${b[0]}')">${b[1]}</button>`).join('');
}
function addMsg(text, type) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = text;
  messages.insertBefore(div, document.getElementById('typing'));
  messages.scrollTop = messages.scrollHeight;
}
function addBookingForm() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.style.maxWidth = '90%';
  div.innerHTML = `<div class="booking-form"><h4>📅 ご予約フォーム</h4><select><option>ご希望のサービス</option><option>経営コンサルティング</option><option>AI導入支援</option><option>Webマーケティング</option></select><input type="text" placeholder="ご希望日（例：12/15）"><input type="text" placeholder="ご希望時間（例：14:00）"><input type="text" placeholder="お名前"><button onclick="this.textContent='✅ 予約受付完了！確認メールを送信しました'">予約を確定する</button></div>`;
  messages.insertBefore(div, document.getElementById('typing'));
  messages.scrollTop = messages.scrollHeight;
}
function addNotifyCard() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.style.maxWidth = '90%';
  div.innerHTML = `<div class="notify-card"><p>📧 以下の内容でメールを送信します：</p><div class="email-preview"><div>宛先：tanaka@example.com</div><div>件名：【株式会社サクラビジネス】お問い合わせありがとうございます</div><div style="margin-top:8px;">田中様、この度はお問い合わせいただきありがとうございます。担当者より24時間以内にご連絡いたします。</div></div><button onclick="this.textContent='✅ 送信完了'" style="background:#7c6bff;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;margin-top:10px;font-size:0.85rem;">メールを送信する</button></div>`;
  messages.insertBefore(div, document.getElementById('typing'));
  messages.scrollTop = messages.scrollHeight;
}
function getFaqReply(msg) {
  for (const [k,v] of Object.entries(faqMap)) { if (msg.includes(k)) return v; }
  return 'ご質問ありがとうございます。担当者にお繋ぎします。';
}
function showTyping(){document.getElementById('typing').style.display='block';document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;}
function hideTyping(){document.getElementById('typing').style.display='none';}
function send() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  addMsg(text,'user'); input.value='';
  showTyping();
  setTimeout(()=>{hideTyping();addMsg(getFaqReply(text),'bot');},1000);
}
function q(text) { addMsg(text,'user'); showTyping(); setTimeout(()=>{hideTyping();addMsg(getFaqReply(text),'bot');},900); }
</script>
</body>
</html>
