<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャットウィジェット デモ | 株式会社サクラビジネス</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hiragino Kaku Gothic ProN',sans-serif; background:#0a0e1a; color:#e0e0f0; min-height:100vh; }
.page-content { max-width:800px; margin:0 auto; padding:60px 20px; }
.page-content h1 { font-size:2rem; color:#fff; margin-bottom:16px; }
.page-content p { color:#888; line-height:1.8; margin-bottom:16px; }
.page-content .services { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-top:32px; }
@media(max-width:600px){ .page-content .services { grid-template-columns:1fr; } }
.service-card { background:#12121e; border:1px solid #2a2a3e; border-radius:12px; padding:20px; }
.service-card h3 { color:#fff; margin-bottom:8px; }
.service-card p { color:#888; font-size:0.88rem; }
/* Chat widget */
.chat-widget { position:fixed; bottom:24px; right:24px; z-index:1000; }
.chat-toggle { width:60px; height:60px; background:linear-gradient(135deg,#7c6bff,#a78bfa); border-radius:50%; border:none; color:#fff; font-size:1.6rem; cursor:pointer; box-shadow:0 8px 24px rgba(124,107,255,0.5); transition:transform 0.3s; }
.chat-toggle:hover { transform:scale(1.1); }
.chat-badge { position:absolute; top:-4px; right:-4px; width:20px; height:20px; background:#ff4d4d; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#fff; font-weight:700; }
.chat-panel { display:none; width:320px; background:#12121e; border:1px solid #2a2a3e; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5); margin-bottom:12px; }
.chat-panel.open { display:block; }
.chat-head { background:linear-gradient(135deg,#7c6bff,#a78bfa); padding:16px 20px; display:flex; align-items:center; gap:12px; }
.chat-head .avatar { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; }
.chat-head h4 { color:#fff; font-size:0.9rem; }
.chat-head p { color:rgba(255,255,255,0.8); font-size:0.75rem; }
.chat-head .close-btn { margin-left:auto; background:none; border:none; color:#fff; font-size:1.2rem; cursor:pointer; }
.chat-msgs { height:260px; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
.chat-msg { max-width:85%; padding:9px 13px; border-radius:14px; font-size:0.85rem; line-height:1.4; }
.chat-msg.bot { background:#1a1a3e; color:#e0e0f0; align-self:flex-start; border-bottom-left-radius:4px; }
.chat-msg.user { background:linear-gradient(135deg,#7c6bff,#a78bfa); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.chat-qr { padding:8px 12px; display:flex; gap:6px; flex-wrap:wrap; border-top:1px solid #1a1a2e; }
.chat-qr-btn { background:#1a1a3e; border:1px solid #2a2a3e; color:#a78bfa; padding:4px 10px; border-radius:12px; font-size:0.78rem; cursor:pointer; }
.chat-qr-btn:hover { background:#2a2a5e; }
.chat-input { display:flex; gap:6px; padding:10px 12px; border-top:1px solid #2a2a3e; }
.chat-input input { flex:1; background:#0a0e1a; border:1px solid #2a2a3e; color:#fff; padding:7px 12px; border-radius:50px; font-size:0.83rem; outline:none; }
.chat-input button { background:#7c6bff; border:none; color:#fff; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:0.85rem; }
.typing { display:none; padding:8px 12px; background:#1a1a3e; border-radius:14px; align-self:flex-start; }
.typing span { display:inline-block; width:6px; height:6px; background:#7c6bff; border-radius:50%; animation:b 1.4s infinite; margin-right:2px; }
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
</head>
<body>
<div style="background:#7c6bff;color:#fff;padding:8px;text-align:center;font-size:0.85rem;">🎨 これはデモサイトです | <a href="../service-chatbot.html" style="color:#fff;">← サービス詳細に戻る</a></div>
<div class="page-content">
  <h1>🌸 株式会社サクラビジネス</h1>
  <p>AIと経営のプロが伴走する中小企業向け支援サービスです。右下のチャットボタンからお気軽にご相談ください。</p>
  <div class="services">
    <div class="service-card"><h3>🏢 経営コンサル</h3><p>戦略立案から実行支援まで</p></div>
    <div class="service-card"><h3>🤖 AI導入支援</h3><p>業務効率化のAI活用</p></div>
    <div class="service-card"><h3>📈 Webマーケ</h3><p>SEO・SNS・広告運用</p></div>
    <div class="service-card"><h3>💰 財務支援</h3><p>補助金申請・資金調達</p></div>
  </div>
  <p style="margin-top:40px;text-align:center;color:#666;">👇 右下のチャットボタンを押してデモを体験してください</p>
</div>
<!-- Chat Widget -->
<div class="chat-widget">
  <div class="chat-panel" id="chatPanel">
    <div class="chat-head">
      <div class="avatar">🤖</div>
      <div><h4>サクラAI</h4><p>平均応答 &lt;1秒</p></div>
      <button class="close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="chat-msg bot">こんにちは！何でもご相談ください。</div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-qr">
      <button class="chat-qr-btn" onclick="cq('料金を教えてください')">料金は？</button>
      <button class="chat-qr-btn" onclick="cq('無料相談したい')">無料相談</button>
      <button class="chat-qr-btn" onclick="cq('営業時間を教えてください')">営業時間</button>
    </div>
    <div class="chat-input">
      <input type="text" id="ci" placeholder="メッセージ..." onkeydown="if(event.key==='Enter')cs()">
      <button onclick="cs()">➤</button>
    </div>
  </div>
  <button class="chat-toggle" onclick="toggleChat()">💬<div class="chat-badge">1</div></button>
</div>
<script>
function toggleChat(){
  const p=document.getElementById('chatPanel');
  p.classList.toggle('open');
  document.querySelector('.chat-badge').style.display='none';
}
const faqs={'料金':'月額¥30,000〜からご利用いただけます。詳しくはプランページをご覧ください。','無料相談':'初回相談は完全無料です。フォームかお電話（03-0000-0000）でご予約ください。','営業時間':'平日9:00〜18:00です。フォームは24時間受付中です。'};
function getR(m){for(const[k,v]of Object.entries(faqs)){if(m.includes(k))return v;}return 'ご質問ありがとうございます。担当者よりご連絡いたします。お電話: 03-0000-0000';}
function addM(t,type){const m=document.getElementById('chatMsgs');const d=document.createElement('div');d.className='chat-msg '+type;d.textContent=t;m.insertBefore(d,document.getElementById('typing'));m.scrollTop=m.scrollHeight;}
function st(){document.getElementById('typing').style.display='block';document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;}
function ht(){document.getElementById('typing').style.display='none';}
function cs(){const i=document.getElementById('ci');const t=i.value.trim();if(!t)return;addM(t,'user');i.value='';st();setTimeout(()=>{ht();addM(getR(t),'bot');},900);}
function cq(t){addM(t,'user');st();setTimeout(()=>{ht();addM(getR(t),'bot');},800);}
</script>
</body>
</html>
