<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNSリンクページ デモ - プレミアム | 株式会社サクラビジネス</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #7c6bff44;}50%{box-shadow:0 0 40px #7c6bff88;}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
body{background:#0a0e1a;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 20%,#7c6bff22,transparent 50%),radial-gradient(ellipse at 80% 80%,#ff6b9d22,transparent 50%);pointer-events:none;}
.banner{background:#7c6bff;color:#fff;padding:8px;text-align:center;font-size:0.85rem;position:relative;z-index:10;}
.banner a{color:#fff;}
.page{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;}
.card{max-width:440px;width:100%;text-align:center;position:relative;z-index:1;}
.avatar-wrap{display:inline-block;margin-bottom:16px;animation:float 4s ease-in-out infinite;}
.avatar{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#7c6bff,#ff6b9d,#7c6bff);background-size:200%;animation:shimmer 3s linear infinite,glow 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:3rem;border:3px solid rgba(255,255,255,0.2);}
.verified{background:linear-gradient(135deg,#7c6bff,#ff6b9d);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;margin:0 auto 8px;}
.name{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#7c6bff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.handle{font-size:0.85rem;color:#8888aa;margin-bottom:8px;}
.bio{font-size:0.85rem;color:#c0c0d8;margin-bottom:14px;line-height:1.6;}
.social-stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;}
.stat-item{text-align:center;}
.stat-num{font-size:1.1rem;font-weight:800;color:#7c6bff;}
.stat-label{font-size:0.7rem;color:#8888aa;}
.link-btn{display:flex;align-items:center;gap:12px;border-radius:14px;padding:14px 20px;margin-bottom:10px;text-decoration:none;color:#fff;font-weight:600;font-size:0.9rem;transition:all 0.3s;position:relative;overflow:hidden;}
.link-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:left 0.5s;}
.link-btn:hover::before{left:100%;}
.link-btn.primary{background:linear-gradient(135deg,#7c6bff,#9b59b6);border:1px solid #7c6bff88;}
.link-btn.secondary{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);}
.link-btn:hover{transform:translateY(-3px);filter:brightness(1.15);}
.link-icon{font-size:1.3rem;width:28px;text-align:center;}
.link-text{flex:1;text-align:left;}
.latest-posts{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:16px;text-align:left;}
.latest-posts h4{font-size:0.8rem;color:#8888aa;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.post-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#2d2b55);display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:transform 0.2s;}
.post-thumb:hover{transform:scale(1.05);}
.email-form{background:rgba(124,107,255,0.1);border:1px solid #7c6bff44;border-radius:14px;padding:16px;margin-bottom:16px;}
.email-form h4{font-size:0.85rem;color:#7c6bff;margin-bottom:10px;}
.email-form input{width:100%;background:#0a0e1a;border:1px solid #2a2a3e;border-radius:8px;padding:10px 14px;color:#fff;font-size:0.85rem;margin-bottom:8px;outline:none;}
.email-form input:focus{border-color:#7c6bff;}
.email-form button{width:100%;background:linear-gradient(135deg,#7c6bff,#9b59b6);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-size:0.85rem;}
.shop-badge{background:linear-gradient(135deg,#ff6b6b,#ee0979);color:#fff;border-radius:6px;padding:2px 8px;font-size:0.7rem;font-weight:700;margin-left:auto;}
.footer{font-size:0.72rem;color:#555;margin-top:16px;}
</style>
</head>
<body>
<div class="banner">🎨 これはデモサイトです | <a href="../service-sns-link.html">← サービス詳細に戻る</a></div>
<div class="page">
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar">🌸</div>
    </div>
    <div class="verified">✓</div>
    <div class="name">株式会社サクラビジネス</div>
    <div class="handle">@sakura_business</div>
    <div class="bio">ビジネスの花を咲かせるIT×マーケティング支援 🌸<br>HP制作 / LINE構築 / Notion / AI自動化</div>
    <div class="social-stats">
      <div class="stat-item"><div class="stat-num">5.2K</div><div class="stat-label">フォロワー</div></div>
      <div class="stat-item"><div class="stat-num">284</div><div class="stat-label">投稿</div></div>
      <div class="stat-item"><div class="stat-num">4.8★</div><div class="stat-label">評価</div></div>
    </div>

    <div class="latest-posts">
      <h4>📸 最新の投稿</h4>
      <div class="post-grid">
        <div class="post-thumb">🌸</div>
        <div class="post-thumb">💻</div>
        <div class="post-thumb">📊</div>
        <div class="post-thumb">🤖</div>
        <div class="post-thumb">📱</div>
        <div class="post-thumb">✨</div>
      </div>
    </div>

    <a class="link-btn primary" href="#" onclick="return false;"><span class="link-icon">🛒</span><span class="link-text">オンラインショップ</span><span class="shop-badge">NEW</span></a>
    <a class="link-btn secondary" href="#" onclick="return false;"><span class="link-icon">🌐</span><span class="link-text">公式ウェブサイト</span></a>
    <a class="link-btn secondary" href="#" onclick="return false;"><span class="link-icon">📸</span><span class="link-text">Instagram</span></a>
    <a class="link-btn secondary" href="#" onclick="return false;"><span class="link-icon">🐦</span><span class="link-text">X (Twitter)</span></a>
    <a class="link-btn secondary" href="#" onclick="return false;"><span class="link-icon">💬</span><span class="link-text">LINE公式アカウント</span></a>

    <div class="email-form">
      <h4>📩 メルマガ登録（特典付き）</h4>
      <input type="email" placeholder="メールアドレスを入力">
      <button onclick="alert('登録ありがとうございます！特典をお送りします🌸')">無料特典を受け取る 🎁</button>
    </div>

    <div class="footer">🌸 Powered by AI Work Stage Premium</div>
  </div>
</div>
</body>
</html>
